name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: replay-parser-2-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RUST_VERSION: 1.95.0

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: Format
        run: cargo +"$RUST_VERSION" fmt --all -- --check

      - name: Clippy
        run: cargo +"$RUST_VERSION" clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo +"$RUST_VERSION" test --workspace

  image:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: verify
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
